<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SAES | Dashboard Libros</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
  <link rel="stylesheet" href="/plugins/fontawesome-free/css/all.min.css">
  <link rel="stylesheet" href="/dist/css/adminlte.min.css">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">

  <nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <ul class="navbar-nav">
      <li class="nav-item"><a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a></li>
      <li class="nav-item d-none d-sm-inline-block"><a href="/home/MostrarInicio" class="nav-link">Dashboard</a></li>
    </ul>
  </nav>

  <aside class="main-sidebar sidebar-dark-primary elevation-4">
    <a href="/home/MostrarInicio" class="brand-link">
      <span class="brand-text font-weight-light pl-4">SAES UPIIZ</span>
    </a>
    <div class="sidebar">
      <nav class="mt-2">
        <ul class="nav nav-pills nav-sidebar flex-column">
          <li class="nav-item">
            <a href="/TablasFormulariosLuis/MostrarTablaAutores" class="nav-link">
              <i class="nav-icon fas fa-user-edit"></i> <p>Autores</p>
            </a>
          </li>
          <li class="nav-item">
            <a href="/TablasFormulariosLuis/MostrarTablaLibros" class="nav-link">
              <i class="nav-icon fas fa-book-open"></i> <p>Libros</p>
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </aside>

  <div class="content-wrapper">
    <section class="content-header">
      <div class="container-fluid">
        <h1>Panel de Control: Biblioteca Virtual</h1>
      </div>
    </section>

    <section class="content">
      <div class="container-fluid">

        <div class="row">
          <div class="col-md-6">
            <div class="card card-primary card-outline">
              <div class="card-header"><h3 class="card-title">Histórico de Publicaciones (Año)</h3></div>
              <div class="card-body"><canvas id="areaChart" style="height: 250px; max-height: 250px; max-width: 100%;"></canvas></div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="card card-danger card-outline">
              <div class="card-header"><h3 class="card-title">Distribución por Nacionalidad</h3></div>
              <div class="card-body"><canvas id="donutChart" style="height: 250px; max-height: 250px; max-width: 100%;"></canvas></div>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6">
            <div class="card card-success card-outline">
              <div class="card-header"><h3 class="card-title">Cantidad de Libros por Autor</h3></div>
              <div class="card-body"><canvas id="barChart" style="height: 250px; max-height: 250px; max-width: 100%;"></canvas></div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="card card-info card-outline">
              <div class="card-header"><h3 class="card-title">Resumen de la Base de Datos</h3></div>
              <div class="card-body"><canvas id="totalChart" style="height: 250px; max-height: 250px; max-width: 100%;"></canvas></div>
            </div>
          </div>
        </div>

      </div>
    </section>
  </div>
</div>

<script src="/plugins/jquery/jquery.min.js"></script>
<script src="/plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.4/Chart.min.js"></script>
<script src="/dist/js/adminlte.min.js"></script>

<script th:inline="javascript">
  $(function () {
    let autores = /*[[${listaAutores}]]*/ [];
    let libros = /*[[${listaLibros}]]*/ [];

    if (!autores) autores = [];
    if (!libros) libros = [];

    // --- 1. LÓGICA LIBROS POR AUTOR ---
    let nombresAutores = [];
    let cantidadLibrosPorAutor = [];
    autores.forEach(a => {
        let id = a.id_Autor || a.id_autor;
        let nombre = a.nombre_Autor || a.Nombre_Autor || 'Autor';
        let total = libros.filter(l => (l.id_Autor || l.id_autor) === id).length;
        nombresAutores.push(nombre);
        cantidadLibrosPorAutor.push(total);
    });

    // --- 2. LÓGICA NACIONALIDADES ---
    let conteoNac = {};
    autores.forEach(a => {
        let nac = a.nacionalidad_Autor || a.Nacionalidad_Autor || 'Otros';
        conteoNac[nac] = (conteoNac[nac] || 0) + 1;
    });
    let labelsNac = Object.keys(conteoNac).map(k => k + ' (' + conteoNac[k] + ')');
    let datosNac = Object.values(conteoNac);

    // --- 3. LÓGICA HISTÓRICO (LIBRO - AÑO) ---
    let libLabels = libros.map(l => (l.titulo_Libro || l.Titulo_Libro));
    let libAnios = libros.map(l => (l.anio_Publicacion_Libro || l.Anio_Publicacion_Libro));


    // --- RENDERIZADO DE GRÁFICAS ---

    // Gráfico Azul: Histórico
    new Chart($('#areaChart').get(0).getContext('2d'), {
      type: 'bar',
      data: {
        labels: libLabels,
        datasets: [{ label: 'Año de Publicación', backgroundColor: '#007bff', data: libAnios }]
      },
      options: { maintainAspectRatio: false, scales: { yAxes: [{ ticks: { suggestedMin: 1900 } }] } }
    });

    // Gráfico Rojo: Nacionalidades
    new Chart($('#donutChart').get(0).getContext('2d'), {
      type: 'doughnut',
      data: {
        labels: labelsNac,
        datasets: [{ data: datosNac, backgroundColor: ['#f56954', '#00a65a', '#f39c12', '#00c0ef', '#3c8dbc'] }]
      },
      options: { maintainAspectRatio: false }
    });

    // Gráfico Verde: Libros por Autor
    new Chart($('#barChart').get(0).getContext('2d'), {
      type: 'bar',
      data: {
        labels: nombresAutores,
        datasets: [{ label: 'Cantidad de Libros', backgroundColor: '#28a745', data: cantidadLibrosPorAutor }]
      },
      options: { maintainAspectRatio: false, scales: { yAxes: [{ ticks: { beginAtZero: true, stepSize: 1 } }] } }
    });

    // Gráfico Info: Totales Generales (NUEVO)
    new Chart($('#totalChart').get(0).getContext('2d'), {
      type: 'pie',
      data: {
        labels: ['Total Autores', 'Total Libros'],
        datasets: [{
          data: [autores.length, libros.length],
          backgroundColor: ['#17a2b8', '#3c8dbc']
        }]
      },
      options: { maintainAspectRatio: false }
    });
  });
</script>
</body>
</html>
