<!DOCTYPE html>
<html lang="es" xmlns:th = "http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SAES | Crear Libro</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
  <link rel="stylesheet" href="../../plugins/fontawesome-free/css/all.min.css">
  <link rel="stylesheet" href="../../plugins/icheck-bootstrap/icheck-bootstrap.min.css">
  <link rel="stylesheet" href="../../dist/css/adminlte.min.css">
</head>
<body class="hold-transition login-page">
<div class="login-box">
  <div class="login-logo">
    <a th:href="@{/TablasFormulariosLuis/MostrarTablaLibros}"><b>SAES</b> Libros</a>
  </div>
  <div class="card card-outline card-primary">
    <div class="card-body login-card-body">
      <p class="login-box-msg">Rellena los datos para registrar un libro</p>

      <form th:action="@{/TablasFormulariosLuis/CrearLibro}" th:object="${libro}" method="post">

        <div class="input-group mb-3">
          <input type="text" class="form-control" th:field="*{Titulo_Libro}" placeholder="Título del libro" required>
          <div class="input-group-append">
            <div class="input-group-text">
              <span class="fas fa-book"></span>
            </div>
          </div>
        </div>

        <div class="input-group mb-3">
          <input type="number" min="1500" max="2026" step="1" class="form-control" th:field="*{Anio_Publicacion_Libro}" placeholder="Año de publicación" required>
          <div class="input-group-append">
            <div class="input-group-text">
              <span class="fas fa-calendar-alt"></span>
            </div>
          </div>
        </div>

        <div class="input-group mb-3">
          <input type="number" class="form-control" th:field="*{id_Autor}" placeholder="ID del autor (Número)" required>
          <div class="input-group-append">
            <div class="input-group-text">
              <span class="fas fa-user"></span>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-12">
            <button type="submit" class="btn btn-primary btn-block">Crear libro</button>
          </div>
        </div>
      </form>

      <p class="mt-3 mb-1 text-center">
        <a th:href="@{/TablasFormulariosLuis/MostrarTablaLibros}">Regresar a la tabla</a>
      </p>
    </div>
  </div>
</div>
<script src="../../plugins/jquery/jquery.min.js"></script>
<script src="../../plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="../../dist/js/adminlte.min.js"></script>
</body>
</html>
